# .air.toml
# Config file for [Air](https://github.com/cosmtrek/air) in TOML format

root = "."
tmp_dir = "bin"

[build]
cmd = "go build -o ./bin/api ./cmd/api"
bin = "./bin/api"
full_bin = ""
include_ext = ["go", "tpl", "tmpl", "html", "env"]
exclude_dir = ["assets", "tmp", "vendor", "flutter_app"]
include_dir = []
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = false
follow_symlink = false
log = "build-errors.log"
send_interrupt = true
kill_delay = "500ms"

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = false
