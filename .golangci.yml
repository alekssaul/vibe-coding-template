run:
  timeout: 5m
  issues-exit-code: 1

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - bodyclose
    - noctx
    - exhaustive

linters-settings:
  goimports:
    local-prefixes: github.com/alekssaul/template

issues:
  exclude-rules:
    # Allow fmt.Println in main and test files
    - path: _test\.go
      linters:
        - errcheck
